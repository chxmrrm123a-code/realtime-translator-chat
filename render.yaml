services:
  - type: web
    name: realtime-translator-chat
    env: node
    buildCommand: ""
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TRANSLATION_MODEL
        value: gpt-4.1-mini
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_TRANSLATION_MODEL
        value: claude-haiku-4-5
      - key: APP_ACCESS_CODE
        sync: false
      - key: ROOM_CAPACITY
        value: "30"
      - key: ROOM_HISTORY_LIMIT
        value: "5000"
