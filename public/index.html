<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <title>AI 통역 채팅</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css?v=10" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">AI Interpreter Chat</p>
          <h1>실시간 통역방</h1>
        </div>
        <div class="status-pill" id="connectionStatus">대기</div>
      </header>

      <main class="layout">
        <section class="join-panel" id="joinPanel" aria-label="방 입장">
          <div class="field-grid">
            <label>
              <span>방 코드</span>
              <input id="roomInput" autocomplete="off" maxlength="24" />
            </label>
            <label>
              <span>닉네임</span>
              <input id="nameInput" autocomplete="nickname" maxlength="24" />
            </label>
            <label>
              <span>내 언어</span>
              <select id="languageInput">
                <option value="ko">한국어</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="zh">中文</option>
                <option value="vi">Tiếng Việt</option>
              </select>
            </label>
            <label>
              <span>Language</span>
              <select id="uiLanguageInput">
                <option value="ko">&#54620;&#44397;&#50612;</option>
                <option value="en">English</option>
                <option value="ja">&#26085;&#26412;&#35486;</option>
                <option value="zh">&#20013;&#25991;</option>
                <option value="vi">Ti&#7871;ng Vi&#7879;t</option>
              </select>
            </label>
            <label class="wide-field">
              <span>번역 지시사항</span>
              <input id="translationGuideInput" autocomplete="off" maxlength="500" placeholder="예: 나는 anh, 상대는 em / 존댓말 / 회사 업무 말투" />
            </label>
          </div>
          <div class="join-help" aria-label="사용 안내">
            <div class="join-help-item">
              <span class="join-help-number">1</span>
              <span id="helpStepRoom">새 방 코드를 만들거나 초대 링크로 들어오세요.</span>
            </div>
            <div class="join-help-item">
              <span class="join-help-number">2</span>
              <span id="helpStepSettings">내 언어와 번역 지시사항을 정한 뒤 입장하세요.</span>
            </div>
            <div class="join-help-item">
              <span class="join-help-number">3</span>
              <span id="helpStepChat">내가 보낸 말은 상대 언어로, 상대 말은 내 언어로 보여요.</span>
            </div>
          </div>
          <div class="join-actions">
            <button class="primary-button" id="joinButton">입장</button>
            <button class="icon-button" id="newRoomButton" title="새 방 코드" aria-label="새 방 코드">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12a9 9 0 1 1-2.64-6.36" />
                <path d="M21 3v6h-6" />
              </svg>
            </button>
          </div>
        </section>

        <section class="chat-panel" id="chatPanel" aria-label="채팅방" hidden>
          <div class="room-strip">
            <div>
              <span class="room-label">방</span>
              <strong id="roomCodeDisplay"></strong>
            </div>
            <div class="room-tools">
              <span id="memberCount">0명</span>
              <button class="icon-button small" id="translationRulesButton" title="번역 규칙" aria-label="번역 규칙">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 7h10" />
                  <path d="M18 7h2" />
                  <path d="M16 5v4" />
                  <path d="M4 17h2" />
                  <path d="M10 17h10" />
                  <path d="M8 15v4" />
                </svg>
              </button>
              <button class="icon-button small" id="notificationButton" title="알림 켜기" aria-label="알림 켜기" hidden>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9" />
                  <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                </svg>
              </button>
              <button class="icon-button small" id="copyLinkButton" title="초대 링크 복사" aria-label="초대 링크 복사">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="9" y="9" width="13" height="13" rx="2" />
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                </svg>
              </button>
              <button class="icon-button small danger" id="leaveRoomButton" title="&#48169; &#45208;&#44032;&#44592;" aria-label="&#48169; &#45208;&#44032;&#44592;">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                  <path d="M16 17l5-5-5-5" />
                  <path d="M21 12H9" />
                </svg>
              </button>
            </div>
          </div>

          <div class="member-row" id="memberRow"></div>
          <div class="rules-panel" id="translationRulesPanel" hidden>
            <div class="rules-panel-head">
              <strong id="translationRulesTitle">번역 규칙</strong>
              <button class="icon-button small" id="addRuleButton" type="button" title="규칙 추가" aria-label="규칙 추가">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14" />
                  <path d="M5 12h14" />
                </svg>
              </button>
            </div>
            <div class="rules-list" id="translationRulesList"></div>
          </div>

          <ol class="messages" id="messages" aria-live="polite"></ol>

          <form class="composer" id="messageForm">
            <button class="icon-button composer-leave-button danger" id="composerLeaveButton" type="button" title="&#48169; &#45208;&#44032;&#44592;" aria-label="&#48169; &#45208;&#44032;&#44592;">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <path d="M16 17l5-5-5-5" />
                <path d="M21 12H9" />
              </svg>
            </button>
            <textarea id="messageInput" rows="1" maxlength="2000" placeholder="메시지 입력"></textarea>
            <button class="send-button" id="sendButton" type="submit" title="전송" aria-label="전송">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m22 2-7 20-4-9-9-4Z" />
                <path d="M22 2 11 13" />
              </svg>
            </button>
          </form>
        </section>
      </main>
    </div>

    <script src="/app.js?v=10" type="module"></script>
  </body>
</html>
